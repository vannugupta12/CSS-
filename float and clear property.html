<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>float and clear</title>
    <style>
        .box1{
            height: 235px;;
            width:345;
            background-color: blue;
            float:right;
            clear:left

        }
        .box2{
           height:235;
            width:345;
            background-color: red;
            float:left; 
            clear:both;
        }
    </style>
</head>
<body>
    <div class="box1">box1</div>
    <div class="box2">box2</div>
</body>
</html>
